# dev -> staging. dev auto-promotes (see project.yaml); staging is a manual gate
# and pulls its freight from dev.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: guestbook
  annotations:
    kargo.akuity.io/color: red
    kargo.akuity.io/argocd-context: '[{"name":"guestbook-dev","namespace":"argocd"}]'
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: app
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/warmmike/kargo-workshop-kcd-nyc-2026
        - name: image
          value: ghcr.io/warmmike/kargo-workshop-kcd-nyc-2026
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            author:
              name: kargo-bot
              email: kargo-bot@workshop.local
            checkout:
              - branch: main
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/env/dev/k8s/values.yaml
            updates:
              - key: image.tag
                value: ${{ imageFrom(vars.image).Tag }}
        - uses: git-commit
          config:
            path: ./repo
            message: |
              Promote ${{ imageFrom(vars.image).Tag }} to ${{ ctx.stage }}
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-dev
                namespace: argocd
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: guestbook
  annotations:
    kargo.akuity.io/color: amber
    kargo.akuity.io/argocd-context: '[{"name":"guestbook-staging","namespace":"argocd"}]'
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: app
      sources:
        stages:
          - dev
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/warmmike/kargo-workshop-kcd-nyc-2026
        - name: image
          value: ghcr.io/warmmike/kargo-workshop-kcd-nyc-2026
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            author:
              name: kargo-bot
              email: kargo-bot@workshop.local
            checkout:
              - branch: main
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/env/staging/k8s/values.yaml
            updates:
              - key: image.tag
                value: ${{ imageFrom(vars.image).Tag }}
        - uses: git-commit
          config:
            path: ./repo
            message: |
              Promote ${{ imageFrom(vars.image).Tag }} to ${{ ctx.stage }}
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-staging
                namespace: argocd
