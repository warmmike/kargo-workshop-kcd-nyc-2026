apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: app
  namespace: guestbook
spec:
  subscriptions:
    # The guestbook frontend image, published by GitHub Actions on every push to
    # main and tagged with the workflow run number. NewestBuild picks the most
    # recently pushed matching image.
    - image:
        repoURL: ghcr.io/warmmike/kargo-workshop-kcd-nyc-2026
        imageSelectionStrategy: NewestBuild
        allowTags: ^[0-9]+$
        discoveryLimit: 10
    # The repo itself, so the chart/lambda/terraform source travels with the
    # freight. We exclude env/ (the promotion writes there) to avoid a loop.
    - git:
        repoURL: https://github.com/warmmike/kargo-workshop-kcd-nyc-2026
        includePaths:
          - app/
          - lambda/
          - charts/
        excludePaths:
          - env/
