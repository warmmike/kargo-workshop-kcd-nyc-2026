# dev -> staging -> prod -> {prod-amer-east, prod-amer-west, prod-emea}.
# prod is a control/gate stage: it renders each region's values and commits them;
# the regional stages then auto-promote (fan-out) and sync their Argo CD app.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: guestbook
  annotations:
    kargo.akuity.io/color: red
    kargo.akuity.io/argocd-context: '[{"name":"guestbook-dev","namespace":"argocd"}]'
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: app
      sources:
        direct: true
  verification:
    analysisTemplates:
      - name: smoke-test
    args:
      - name: stage
        value: dev
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/warmmike/kargo-workshop-kcd-nyc-2026
        - name: image
          value: ghcr.io/warmmike/kargo-workshop-kcd-nyc-2026
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            author:
              name: kargo-bot
              email: kargo-bot@workshop.local
            checkout:
              - branch: main
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/env/dev/k8s/values.yaml
            updates:
              - key: image.tag
                value: ${{ imageFrom(vars.image).Tag }}
        - uses: git-commit
          config:
            path: ./repo
            message: |
              Promote ${{ imageFrom(vars.image).Tag }} to ${{ ctx.stage }}
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-dev
                namespace: argocd
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: guestbook
  annotations:
    kargo.akuity.io/color: amber
    kargo.akuity.io/argocd-context: '[{"name":"guestbook-staging","namespace":"argocd"}]'
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: app
      sources:
        stages:
          - dev
  verification:
    analysisTemplates:
      - name: e2e-test
    args:
      - name: stage
        value: staging
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/warmmike/kargo-workshop-kcd-nyc-2026
        - name: image
          value: ghcr.io/warmmike/kargo-workshop-kcd-nyc-2026
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            author:
              name: kargo-bot
              email: kargo-bot@workshop.local
            checkout:
              - branch: main
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/env/staging/k8s/values.yaml
            updates:
              - key: image.tag
                value: ${{ imageFrom(vars.image).Tag }}
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: |
              Promote ${{ imageFrom(vars.image).Tag }} to ${{ ctx.stage }}
        - uses: git-push
          as: push
          if: ${{ status('commit') != 'Skipped' }}
          config:
            path: ./repo
            generateTargetBranch: true
        - uses: git-open-pr
          as: open-pr
          if: ${{ status('commit') != 'Skipped' }}
          config:
            repoURL: ${{ vars.repoURL }}
            sourceBranch: ${{ outputs['push'].branch }}
            targetBranch: main
            title: "Promote guestbook ${{ imageFrom(vars.image).Tag }} to staging"
            description: |
              Kargo staging promotion for guestbook ${{ imageFrom(vars.image).Tag }}.
              Merging this PR approves the promotion to staging.
        - uses: send-message
          as: notify
          if: ${{ status('open-pr') != 'Skipped' }}
          config:
            channel:
              kind: MessageChannel
              name: email
            message: |
              Guestbook ${{ imageFrom(vars.image).Tag }} is ready for staging approval.
              Review and merge the pull request to promote: ${{ outputs['open-pr'].pr.url }}
            smtp:
              to:
                - replace@with_an_email.address
              subject: "[Kargo] Staging approval needed: guestbook ${{ imageFrom(vars.image).Tag }}"
        - uses: git-wait-for-pr
          as: wait-for-pr
          if: ${{ status('open-pr') != 'Skipped' }}
          config:
            repoURL: ${{ vars.repoURL }}
            prNumber: ${{ outputs['open-pr'].pr.id }}
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-staging
                namespace: argocd
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: guestbook
  annotations:
    kargo.akuity.io/color: violet
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: app
      sources:
        stages:
          - staging
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/warmmike/kargo-workshop-kcd-nyc-2026
        - name: image
          value: ghcr.io/warmmike/kargo-workshop-kcd-nyc-2026
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            author:
              name: kargo-bot
              email: kargo-bot@workshop.local
            checkout:
              - branch: main
                path: ./repo
        - uses: snow-create
          as: snow-create
          config:
            credentials:
              secretName: kargo-step-snow
              type: api-token
            tableName: change_request
            template:
              type: normal
            parameters:
              short_description: "Deploy guestbook ${{ imageFrom(vars.image).Tag }} to production"
              assignment_group: "Application Development"
              impact: "3"
              urgency: "3"
              implementation_plan: "Promote guestbook ${{ imageFrom(vars.image).Tag }} to all prod regions via Kargo promotion ${{ ctx.promotion }}."
        - uses: snow-wait-for-condition
          as: snow-wait
          config:
            credentials:
              secretName: kargo-step-snow
              type: api-token
            tableName: change_request
            ticketId: ${% outputs['snow-create'].sys_id %}
            condition: state=-1
        # Render values for each region from the same freight.
        - uses: yaml-update
          config:
            path: ./repo/env/prod-amer-east/k8s/values.yaml
            updates:
              - key: image.tag
                value: ${{ imageFrom(vars.image).Tag }}
        - uses: yaml-update
          config:
            path: ./repo/env/prod-amer-west/k8s/values.yaml
            updates:
              - key: image.tag
                value: ${{ imageFrom(vars.image).Tag }}
        - uses: yaml-update
          config:
            path: ./repo/env/prod-emea/k8s/values.yaml
            updates:
              - key: image.tag
                value: ${{ imageFrom(vars.image).Tag }}
        - uses: git-commit
          config:
            path: ./repo
            message: |
              Promote ${{ imageFrom(vars.image).Tag }} to production (all regions)
        - uses: git-push
          config:
            path: ./repo
        # Close out the change request.
        - uses: snow-update
          as: snow-update
          config:
            credentials:
              secretName: kargo-step-snow
              type: api-token
            tableName: change_request
            ticketId: ${% outputs['snow-create'].sys_id %}
            parameters:
              state: "Review"
              work_notes: "Production promotion of guestbook ${{ imageFrom(vars.image).Tag }} complete."
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod-amer-east
  namespace: guestbook
  annotations:
    kargo.akuity.io/color: violet
    kargo.akuity.io/argocd-context: '[{"name":"guestbook-prod-amer-east","namespace":"argocd"}]'
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: app
      sources:
        stages:
          - prod
        autoPromotionOptions:
          selectionPolicy: MatchUpstream
  verification:
    analysisTemplates:
      - name: smoke-test
    args:
      - name: stage
        value: prod-amer-east
  promotionTemplate:
    spec:
      steps:
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-prod-amer-east
                namespace: argocd
