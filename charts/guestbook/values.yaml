replicaCount: 1

image:
  repository: ghcr.io/warmmike/kargo-workshop-kcd-nyc-2026
  pullPolicy: IfNotPresent
  # Overridden per environment by Kargo (env/<stage>/k8s/values.yaml).
  tag: latest

imagePullSecrets: []

# Human-friendly environment label shown in the UI.
stage: dev

# Environment variables passed to the container. LAMBDA_URL is populated by the
# Kargo promotion from the Terraform output after the Lambda is applied.
env:
  LAMBDA_URL: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}

resources:
  limits:
    cpu: 50m
    memory: 64Mi
  requests:
    cpu: 10m
    memory: 32Mi
